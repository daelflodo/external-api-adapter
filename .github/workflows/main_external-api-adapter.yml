name: Build and deploy Node.js app to Azure Web App - external-api-adapter

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build
          npm prune --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'external-api-adapter'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREWEBAPPS_PUBLISH_PROFILE }}
          package: .
